<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Application Tracker</h1>
      <p class="topbar__sub">// job search pipeline</p>
    </div>
    <button id="btn-toggle-form" class="btn btn--primary">+ Add application</button>
  </header>

  <section id="stats" class="stats" aria-label="Pipeline statistics"></section>

  <form id="add-form" class="add-form" hidden>
    <div class="add-form__grid">
      <label>Company *<input name="company" required maxlength="200"></label>
      <label>Role *<input name="role" required maxlength="200"></label>
      <label>Status
        <select name="status">
          <option value="saved">Saved</option>
          <option value="applied" selected>Applied</option>
          <option value="screening">Screening</option>
          <option value="interview">Interview</option>
          <option value="offer">Offer</option>
        </select>
      </label>
      <label>Date applied<input name="date_applied" type="date"></label>
      <label>Follow-up date<input name="follow_up_date" type="date"></label>
      <label>Resume version
        <select name="resume_version">
          <option value="">–</option>
          <option value="IT-Data">IT-Data</option>
          <option value="Engineering">Engineering</option>
        </select>
      </label>
      <label>Location<input name="location" maxlength="200" placeholder="Windsor, ON / Remote"></label>
      <label>Source<input name="source" maxlength="100" placeholder="Indeed, LinkedIn, referral"></label>
      <label>Job URL<input name="job_url" type="url" placeholder="https://..."></label>
      <label class="add-form__wide">Notes<textarea name="notes" rows="2" maxlength="5000"></textarea></label>
    </div>
    <div class="add-form__actions">
      <button type="submit" class="btn btn--primary">Save application</button>
      <button type="button" id="btn-cancel" class="btn">Cancel</button>
    </div>
  </form>

  <section class="filters" aria-label="Filters">
    <div id="status-filters" class="filters__pills"></div>
    <input id="search" type="search" placeholder="Search company..." aria-label="Search by company">
  </section>

  <main>
    <table class="apps-table" aria-label="Applications">
      <thead>
        <tr>
          <th>Company</th><th>Role</th><th>Status</th><th>Applied</th>
          <th>Follow-up</th><th>Resume</th><th>Source</th><th></th>
        </tr>
      </thead>
      <tbody id="apps-body"></tbody>
    </table>
    <p id="empty-state" class="empty" hidden>No applications match. Add one to get started.</p>
  </main>

  <div id="toast" class="toast" role="status" hidden></div>

  <script src="app.js"></script>
</body>
</html>
